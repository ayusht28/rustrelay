version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rustrelay
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rustrelay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustrelay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment to run the gateway in Docker:
  # gateway:
  #   build: .
  #   ports:
  #     - "8080:8080"
  #     - "9090:9090"
  #   environment:
  #     DATABASE_URL: postgres://rustrelay:password@postgres:5432/rustrelay
  #     REDIS_URL: redis://redis:6379
  #     JWT_SECRET: dev-secret-change-in-production
  #     NODE_ID: node-docker-1
  #     RUST_LOG: rustrelay=debug
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  pgdata:
