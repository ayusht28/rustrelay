services:
  - type: web
    name: rustrelay
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "10000"
      - key: NODE_ID
        value: node-render-1
      - key: REDIS_URL
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: RUST_LOG
        value: rustrelay=info
      - key: HEARTBEAT_INTERVAL_SECS
        value: "30"
      - key: HEARTBEAT_TIMEOUT_SECS
        value: "3600"
      - key: PRESENCE_OFFLINE_DEBOUNCE_SECS
        value: "5"
      - key: READSTATE_FLUSH_INTERVAL_SECS
        value: "5"
      - key: READSTATE_FLUSH_BATCH_SIZE
        value: "1000"
      - key: CHANNEL_MEMBER_CACHE_TTL_SECS
        value: "300"
      - key: METRICS_PORT
        value: "9090"
      - key: DATABASE_URL
        fromDatabase:
          name: rustrelay-db
          property: connectionString

databases:
  - name: rustrelay-db
    plan: free
